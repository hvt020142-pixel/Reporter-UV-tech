name: Send report to Telegram

on:
  push:
    branches: [main]
    paths:
      - 'reports/**'

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # cần commit trước đó để biết file nào vừa đổi

      - name: Find newest report
        id: pick
        run: |
          set -euo pipefail
          # Chỉ xét báo cáo đặt tên theo ngày: reports/YYYY-MM-DD.md
          # (bỏ qua file mẫu như _TEMPLATE.md hoặc file không theo định dạng ngày)
          DATE_RE='^reports/[0-9]{4}-[0-9]{2}-[0-9]{2}\.md$'
          # Lấy file vừa được thêm/sửa trong lần push này
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            FILE=$(git diff --name-only --diff-filter=AM HEAD^ HEAD \
                   | grep -E "${DATE_RE}" | sort | tail -n1 || true)
          else
            FILE=""
          fi
          # Dự phòng: nếu push này không đổi báo cáo theo ngày nào, bỏ qua gửi
          if [ -z "${FILE}" ]; then
            echo "Push này không thêm/sửa báo cáo theo ngày (reports/YYYY-MM-DD.md) — bỏ qua gửi Telegram."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Chọn file: ${FILE}"
          echo "file=${FILE}"               >> "$GITHUB_OUTPUT"
          echo "name=$(basename "${FILE}")"  >> "$GITHUB_OUTPUT"

      - name: Send document to Telegram
        if: steps.pick.outputs.skip != 'true'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
          FILE: ${{ steps.pick.outputs.file }}
          NAME: ${{ steps.pick.outputs.name }}
        run: |
          set -euo pipefail
          RESP=$(curl -sS -w '\n%{http_code}' \
            -F "chat_id=${TG_CHAT}" \
            -F "document=@${FILE};type=text/markdown" \
            -F "caption=📄 Bản tin UAV — ${NAME}" \
            "https://api.telegram.org/bot${TG_TOKEN}/sendDocument")
          BODY=$(printf '%s' "$RESP" | sed '$d')
          CODE=$(printf '%s' "$RESP" | tail -n1)
          echo "HTTP ${CODE}"; echo "$BODY"
          if [ "$CODE" != "200" ]; then
            echo "Gửi Telegram thất bại (xem phản hồi ở trên)"; exit 1
          fi
